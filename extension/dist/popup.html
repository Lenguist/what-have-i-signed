<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Have I Signed?</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #0c0b09;
      color: #f0ece4;
      line-height: 1.5;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid #1f1c16;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      color: #f59e0b;
      font-family: monospace;
      letter-spacing: -0.02em;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
    }
    .status-dot.offline { background: #f87171; }
    .status-dot.loading { background: #f59e0b; }

    .body {
      padding: 16px;
    }

    .page-info {
      margin-bottom: 16px;
      padding: 10px 12px;
      background: #111009;
      border: 1px solid #1f1c16;
      border-radius: 6px;
    }

    .page-url {
      font-size: 11px;
      color: #7a7060;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
      font-family: monospace;
    }

    .page-title {
      font-size: 13px;
      font-weight: 600;
      color: #f0ece4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      width: 100%;
      padding: 11px 16px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn:hover:not(:disabled) { opacity: 0.88; }

    .btn-primary {
      background: #f59e0b;
      color: #000;
    }

    .btn-secondary {
      background: #111009;
      color: #f0ece4;
      border: 1px solid #1f1c16;
      margin-top: 8px;
    }

    .message {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .message.success {
      background: rgba(74, 222, 128, 0.08);
      border: 1px solid rgba(74, 222, 128, 0.25);
      color: #4ade80;
    }
    .message.error {
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.25);
      color: #f87171;
    }
    .message.info {
      background: rgba(245, 158, 11, 0.08);
      border: 1px solid rgba(245, 158, 11, 0.25);
      color: #f59e0b;
    }

    #not-logged-in {
      display: none;
      text-align: center;
      padding: 8px 0;
    }

    #not-logged-in p {
      color: #7a7060;
      font-size: 13px;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #1f1c16;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer a {
      font-size: 12px;
      color: #7a7060;
      text-decoration: none;
    }
    .footer a:hover { color: #f59e0b; }
  </style>
</head>
<body>

  <div class="header">
    <span class="logo">what-have-i-signed</span>
    <div class="status-dot loading" id="status-dot"></div>
  </div>

  <div class="body">

    <!-- Not logged in state -->
    <div id="not-logged-in">
      <p>Sign in to start saving Terms & Conditions to your personal archive.</p>
      <button class="btn btn-primary" id="btn-login">Sign in →</button>
    </div>

    <!-- Logged in state -->
    <div id="logged-in" style="display:none">
      <div class="page-info">
        <div class="page-url" id="page-url">—</div>
        <div class="page-title" id="page-title">Loading...</div>
      </div>

      <button class="btn btn-primary" id="btn-save">Save this T&C</button>
      <button class="btn btn-secondary" id="btn-dashboard">View my archive →</button>

      <div class="message" id="message"></div>
    </div>

  </div>

  <div class="footer">
    <a href="#" id="link-dashboard">My archive</a>
    <a href="#" id="link-signout">Sign out</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
